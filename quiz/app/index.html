<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="LLM 역사 위키 간격 반복 학습 앱" />
  <title>LLM Wiki Quiz</title>
  <link rel="icon" type="image/svg+xml" href="/LLM_Wiki/favicon.svg" />
  <link rel="apple-touch-icon" href="/LLM_Wiki/pwa-192x192.png" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header">
      <h1>LLM Wiki Quiz</h1>
      <div id="sync-dot" class="sync-indicator disabled"></div>
    </header>

    <!-- Main Content -->
    <main class="app-content" id="view-container">
      <div class="empty-state">
        <div class="empty-state-icon">⏳</div>
        <div class="empty-state-text">로딩 중...</div>
      </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-route="#decks" onclick="location.hash='#decks'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        덱
      </button>
      <button class="nav-item" data-route="#study" onclick="location.hash='#study'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        학습
      </button>
      <button class="nav-item" data-route="#stats" onclick="location.hash='#stats'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 20V10"/>
          <path d="M12 20V4"/>
          <path d="M6 20v-6"/>
        </svg>
        통계
      </button>
      <button class="nav-item" data-route="#settings" onclick="location.hash='#settings'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        설정
      </button>
    </nav>

    <!-- Toast -->
    <div id="toast" class="toast"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
